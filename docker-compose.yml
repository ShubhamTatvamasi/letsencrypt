---
version: "3"
services:
  issue:
    image: neilpang/acme.sh
    env_file:
      - godaddy.keys
    volumes:
      - ./acme.sh/:/acme.sh/
    command: |
      --issue
      -d shubhamtatvamasi.com
      -d *.shubhamtatvamasi.com
      -d *.k7s.shubhamtatvamasi.com
      -d *.k8s.shubhamtatvamasi.com
      -d *.k9s.shubhamtatvamasi.com
      --always-force-new-domain-key
      --server letsencrypt
      --keylength ec-384
      --dns dns_gd
      --force
  help:
    image: neilpang/acme.sh
    command: --help
...
